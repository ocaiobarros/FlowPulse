name: Deploy Supabase (DB + Edge Functions)

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
  workflow_dispatch:

env:
  SUPABASE_PROJECT_REF: mlmvnngtmptiuvjvnivb

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Link project
        run: npx supabase@latest link --project-ref ${{ env.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Repair remote-only migrations
        run: |
          # Get remote migrations not in local directory
          REMOTE_VERSIONS=$(npx supabase@latest migration list 2>/dev/null | grep -oP '^\d{14}' || true)
          for v in $REMOTE_VERSIONS; do
            if [ ! -f "supabase/migrations/${v}_"*.sql ] && [ ! -f "supabase/migrations/${v}.sql" ]; then
              echo "⚠️  Repairing remote-only migration: $v"
              npx supabase@latest migration repair "$v" --status reverted || true
            fi
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push database migrations
        run: npx supabase@latest db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy all Edge Functions
        run: |
          for fn_dir in supabase/functions/*/; do
            fn_name=$(basename "$fn_dir")
            if [[ "$fn_name" == _* ]]; then
              continue
            fi
            echo "🚀 Deploying: $fn_name"
            npx supabase@latest functions deploy "$fn_name" --no-verify-jwt --project-ref ${{ env.SUPABASE_PROJECT_REF }}
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Summary
        run: echo "✅ Supabase deployment complete — migrations + edge functions synced."
